<!DOCTYPE html>
<html>

<head>
  <title>Seismic SRC20 Launcher</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <h1>⚡ Seismic SRC20 Launcher</h1>

  <p class="subtitle">
    Deploy custom SRC20 tokens on Seismic Testnet
  </p>

  <input id="name" placeholder="Token Name">

  <input id="symbol" placeholder="Token Symbol">

  <input id="supply" placeholder="Supply">

  <button class="connect" onclick="connectWallet()">
    Connect Wallet
  </button>

  <button class="deploy" onclick="deployToken()">
    🚀 Deploy SRC20
  </button>

  <p id="status"></p>

  <a
    class="github"
    href="https://github.com/mukairdrop"
    target="_blank"
  >
    ⭐ Follow Me on GitHub
  </a>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
